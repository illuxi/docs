          readOnly: true
        illuxi_availability_target_type:
          type: string
          description: Type of entity this availability applies to (e.g. availability_group)
        illuxi_availability_target_id:
          type: integer
          description: ID of the target entity
        illuxi_availability_status:
          type: string
          description: Status of the availability record
          enum: [active, inactive]
        illuxi_availability_created_date:
          type: string
          format: date-time
          readOnly: true
          description: Date the record was created
        illuxi_availability_updated_date:
          type: string
          format: date-time
          readOnly: true
          description: Date the record was last updated
    Bundle:
      type: object
      properties:
        bundle_id:
          type: integer
          description: Unique identifier of the bundle
          readOnly: true
        bundle_key:
          type: string
          description: Unique key for the bundle
        bundle_status:
          type: string
          description: Publication status of the bundle
        bundle_i18n_title:
          type: string
          description: Title of the bundle
        bundle_created_date:
          type: string
          format: date-time
          readOnly: true
          description: Date the bundle was created
        bundle_updated_date:
          type: string
          format: date-time
