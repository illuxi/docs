  /webhook/subscribe:
    post:
      tags:
        - Webhooks
      description: Subscribe to a webhook to receive a POST request at your URL whenever a specific trigger occurs.
      operationId: subscribeWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - hook_url
                - trigger
                - name
              properties:
                hook_url:
                  type: string
                  format: uri
                  description: The URL to be called when the trigger occurs
                trigger:
                  type: string
                  description: The event that triggers the webhook
                  enum:
                    - user.created
                    - user.updated
                    - product_access.created
                    - product_access.updated
                    - product_access.approved
                    - product_access.rejected
                    - take.completed
                name:
                  type: string
                  description: Name of the webhook
                description:
                  type: string
                  description: Optional description of the webhook
            example:
              hook_url: https://myapp.com/webhook
              trigger: user.created
              name: My webhook
      responses:
        '201':
          description: Webhook subscription created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  message:
                    type: string
                  webhook_id:
                    type: integer
                    description: ID of the created webhook — store this for future unsubscribe operations
              example:
                status: true
                message: Subscription created
                webhook_id: 10
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /webhook/unsubscribe/{webhook_id}:
    delete:
      tags:
        - Webhooks
      description: Unsubscribe from a webhook by its ID.
      operationId: unsubscribeWebhook
      parameters:
        - name: webhook_id
          in: path
          description: ID of the webhook to unsubscribe from
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Webhook unsubscribed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  message:
                    type: string
              example:
                status: true
                message: Unsubscribed
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    Product:
      type: object
      required:
        - product_id
        - product_key
        - product_status
        - product_i18n_title
      properties:
        product_id:
          type: integer
          format: int
          description: Unique identifier of the product
          readOnly: true
        product_key:
          type: string
          description: Unique key identifier for the product
        product_type_id:
          type: string
          description: Type of the product (micro, event)
        product_status:
          type: string
          description: Publication status of the product
          enum: [active, soon, new_release, revision, inactive, cancelled]
        product_i18n_language_id:
          type: string
          description: Language
          enum: [french, english]
          readOnly: true
        product_i18n_slug:
          type: string
          description: URL-friendly slug for the product
        product_i18n_title:
          type: string
          description: Title of the product
        product_i18n_summary:
          type: string
          nullable: true
          description: Short summary of the product
        product_i18n_description:
          type: string
          nullable: true
          description: Full HTML description of the product
        product_price:
          type: number
          format: float
          nullable: true
          description: Price of the product
        product_for_sale:
          type: integer
          description: Whether the product is available for purchase (1 = yes, 0 = no)
        product_add_to_catalog:
          type: integer
          description: Whether the product appears in the catalog (1 = yes, 0 = no)
        product_min_score:
          type: integer
          nullable: true
          description: Minimum score required to pass (percentage)
        product_duration:
          type: integer
          nullable: true
          description: Duration of the product in minutes
        product_event_date:
          type: string
          format: date-time
          nullable: true
          description: Start date of the event (for event-type products)
        product_event_end_date:
          type: string
          format: date-time
          nullable: true
          description: End date of the event (for event-type products)
        product_event_type:
          type: string
          nullable: true
          description: Type of event
          readOnly: true
        product_certificate_report:
          type: integer
          description: Whether a certificate is enabled (1 = yes, 0 = no)
        product_certificate_working_type:
          type: string
          nullable: true
          description: Unit type used for certificate hours (e.g. hours)
        product_allow_notation:
          type: integer
          description: Whether user rating is allowed (1 = yes, 0 = no)
        product_certificate_unit:
          type: integer
          nullable: true
          description: Number of units granted by the certificate
        product_certificate_hour:
          type: integer
          nullable: true
          description: Number of hours granted by the certificate
        product_waiting_list:
          type: integer
          description: Whether a waiting list is enabled (1 = yes, 0 = no)
        product_show_list_of_participants:
          type: integer
          description: Whether the participant list is visible (1 = yes, 0 = no)
        product_min_participant:
          type: integer
          nullable: true
          description: Minimum number of participants required
        product_external_id:
          type: string
          nullable: true
          description: External identifier for integration with third-party systems
        product_external_code:
          type: string
          nullable: true
          description: External code for the product
          readOnly: true
        product_i18n_name:
          type: string
          nullable: true
          description: Alternate localized name
        product_i18n_learn:
          type: string
          nullable: true
          description: HTML content describing what the learner will learn
        product_i18n_certificate_mention:
          type: string
          nullable: true
          description: Text shown on the certificate
        product_i18n_region:
          type: string
          nullable: true
          description: Geographic region targeted by the product
        product_i18n_admissibility:
          type: string
          nullable: true
          description: Admissibility criteria for the product
        product_i18n_audience:
          type: string
          nullable: true
          description: Target audience description
        product_i18n_how_to_access:
          type: string
          nullable: true
