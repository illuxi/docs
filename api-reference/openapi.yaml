openapi: "3.0.0"
info:
  version: 2.0.0
  title: illuxiLMS API
  description: Interact with the illuxiLMS API to manage your learning content and users.
  termsOfService: https://illuxi.com/conditions-utilisation/
  contact:
    name: illuxi Team
    email: info@illuxi.com
    url: https://illuxi.com
servers:
  - url: https://yourportal.illuxi.com/api/v2
    description: Production server (uses live data)
  - url: https://yourportal.preprod.illuxi.com/api/v2
    description: Sandbox server (uses test data)
paths:
  /token:
    post:
      description: Generate an access token to authenticate API requests.
      operationId: generateToken
      requestBody:
        description: API Key for authentication
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - api_key
              properties:
                api_key:
                  type: string
                  description: Your portal's API key
      responses:
        '200':
          description: Token generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: The generated token
        default:
          description: Error generating access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /token/validate:
    get:
      description: Validate token to ensure it is still active
      operationId: validateToken
      parameters:
        - name: Authorization
          in: header
          description: Authentication token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    description: Indicates if the token is valid
                  result:
                    type: object
                    description: Additional information about the token validation
                    properties:
                      message:
                        type: string
                  user_data:
                    type: object
                    properties:
                      api_key:
                        type: string
                        description: API key associated with the token
                      org_id:
                        type: integer
                        description: Organization ID associated with the token
        default:
          description: Error validating access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /product/definition:
    get:
      description: |
        Returns the definition of the product object, including its properties and their types. This endpoint is useful for understanding the structure of the product data and how to interact with it.
      operationId: getProductDefinition
      responses:
        '200':
          description: definition response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  result:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        type:
                          type: string
                        editable:
