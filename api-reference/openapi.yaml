        properties:
          type: object
          description: Custom property key-value pairs
          additionalProperties: true
        user_created_date:
          type: string
          format: date-time
          readOnly: true
          description: Date the user was created
        user_updated_date:
          type: string
          format: date-time
          readOnly: true
          description: Date the user was last updated
    UserGrp:
      type: object
      properties:
        user_grp_id:
