    GetAllRequest:
      type: object
      properties:
        start:
          type: integer
          description: Offset for pagination
          default: 0
        limit:
          type: integer
          description: Maximum number of records to return
          default: 10
        criterias:
          type: array
          description: List of filter criteria
          items:
            type: object
            required:
              - column
              - operator
              - value
            properties:
              column:
                type: string
                description: Field name to filter on
              operator:
                type: string
                description: Comparison operator
                enum: [equal, not_equal, like, in, not_in, greater_than, less_than, greater, lesser]
              value:
                description: Value to compare against
    AvailabilityGroup:
      type: object
      properties:
        availability_group_id:
          type: integer
